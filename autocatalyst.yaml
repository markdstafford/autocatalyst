polling:
  interval_ms: 30000

workspace:
  root: ~/.autocatalyst/workspaces/autocatalyst

channels:
  - provider: slack
    name: ac-autocatalyst
    config:
      bot_token: ${AC_SLACK_BOT_TOKEN}
      app_token: ${AC_SLACK_APP_TOKEN}
      reacjis:
        ack: eyes

publishers:
  - provider: notion
    artifacts:
      - artifact
      - implementation_feedback
    config:
      integration_token: ${AC_NOTION_INTEGRATION_TOKEN}
      specs_database_id: 09be47fc-74c3-42f0-b85a-fb5bdf7ed6c4
      testing_guides_database_id: 59def47e-1412-4c6c-b747-8302f2ae07a5

ai:
  credentials:
    - name: bedrock-iam
      type: iam
      aws_profile: ai-prod-llm

  endpoints:
    - name: bedrock-default
      protocol: anthropic
      credential: bedrock-iam
      region: us-east-1

  profiles:
    - name: classify-haiku
      endpoint: bedrock-default
      model: us.anthropic.claude-haiku-4-5-20251001-v1:0
      runner: anthropic_direct
      anthropic:
        effort: low

    - name: impl-agent
      endpoint: bedrock-default
      model: us.anthropic.claude-sonnet-4-6-20251001-v1:0
      runner: claude_agent_sdk
      anthropic:
        effort: medium
        thinking: adaptive

    - name: artifact-agent
      endpoint: bedrock-default
      model: us.anthropic.claude-sonnet-4-6-20251001-v1:0
      runner: claude_agent_sdk
      anthropic:
        effort: high
        thinking: adaptive

    - name: question-agent
      endpoint: bedrock-default
      model: us.anthropic.claude-sonnet-4-6-20251001-v1:0
      runner: claude_agent_sdk
      anthropic:
        effort: low
        thinking: adaptive

    - name: triage-agent
      endpoint: bedrock-default
      model: us.anthropic.claude-sonnet-4-6-20251001-v1:0
      runner: claude_agent_sdk
      anthropic:
        effort: high
        thinking: adaptive

  routing:
    intent.classify: classify-haiku
    pr.title_generate: classify-haiku
    artifact.create: artifact-agent
    artifact.revise: artifact-agent
    implementation.run: impl-agent
    question.answer: question-agent
    issue.triage: triage-agent
