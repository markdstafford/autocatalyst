workspace:
  root: ~/.autocatalyst/workspaces/autocatalyst
sandbox:
  env_tokens:
    - AC_GITHUB_TOKEN
ai:
  credentials:
    - name: bedrock
      type: iam
      aws_profile: ai-prod-llm
    - name: grove
      type: api_key
      value: ${AC_GROVE_API_KEY}
  endpoints:
    - name: grove-anthropic
      protocol: anthropic
      base_url: https://grove-gateway-prod.azure-api.net/grove-foundry-prod/anthropic
      credential: grove
      anthropic_beta_header_filter:
        strip:
          - advisor-tool-2026-03-01
    - name: grove-openai
      protocol: openai
      base_url: https://grove-gateway-prod.azure-api.net/grove-foundry-prod/openai/v1
      credential: grove
  profiles:
    - name: grove-haiku-4.5-low
      endpoint: grove-anthropic
      model: claude-haiku-4-5
      runner: anthropic_direct
      anthropic:
        effort: low
    - name: grove-sonnet-4.6-medium
      endpoint: grove-anthropic
      model: claude-sonnet-4-6
      runner: claude_agent_sdk
      anthropic:
        effort: medium
        thinking: adaptive
    - name: grove-sonnet-4.6-high
      endpoint: grove-anthropic
      model: claude-sonnet-4-6
      runner: claude_agent_sdk
      anthropic:
        effort: high
        thinking: adaptive
    - name: grove-sonnet-4.6-low
      endpoint: grove-anthropic
      model: claude-sonnet-4-6
      runner: claude_agent_sdk
      anthropic:
        effort: low
        thinking: adaptive
    - name: grove-gpt-5.4-nano
      endpoint: grove-openai
      model: gpt-5.4-nano
      runner: openai_direct
    - name: grove-gpt-5.5-low
      endpoint: grove-openai
      model: gpt-5.5
      runner: openai_agent_sdk
      openai:
        reasoning_effort: low
    - name: grove-gpt-5.5-medium
      endpoint: grove-openai
      model: gpt-5.5
      runner: openai_agent_sdk
      openai:
        reasoning_effort: medium
    - name: grove-gpt-5.5-high
      endpoint: grove-openai
      model: gpt-5.5
      runner: openai_agent_sdk
      openai:
        reasoning_effort: high
  routing:
    # grove-gpt-5.4-nano
    # grove-haiku-4.5-low
    # grove-gpt-5.5-low|medium|high
    # grove-sonnet-4.6-low|medium|high
    intent.classify: grove-gpt-5.4-nano
    pr.title_generate: grove-gpt-5.4-nano
    artifact.create: grove-gpt-5.5-high
    artifact.revise: grove-gpt-5.5-high
    implementation.run: grove-sonnet-4.6-medium
    implementation.review.initial: grove-gpt-5.5-high
    implementation.review.final: grove-gpt-5.5-medium
    question.answer: grove-sonnet-4.6-low
    issue.triage: grove-sonnet-4.6-high
implementation_review:
  max_initial_rounds: 1
  max_final_rounds: 1
  on_review_failure: warn
telemetry:
  metrics_endpoint: http://localhost:8428/opentelemetry/v1/metrics
  logs_endpoint: http://localhost:9428/insert/opentelemetry/v1/logs
  export_interval_ms: 30000
polling:
  interval_ms: 30000
channels:
  - provider: slack
    name: ac-autocatalyst
    config:
      bot_token: ${AC_SLACK_BOT_TOKEN}
      app_token: ${AC_SLACK_APP_TOKEN}
      user_token: ${AC_SLACK_USER_TOKEN}
      reacjis:
        ack: eyes
publishers:
  - provider: notion
    artifacts:
      - artifact
      - implementation_feedback
    config:
      integration_token: ${AC_NOTION_INTEGRATION_TOKEN}
      specs_database_id: 09be47fc-74c3-42f0-b85a-fb5bdf7ed6c4
      testing_guides_database_id: 59def47e-1412-4c6c-b747-8302f2ae07a5
